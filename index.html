<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Les Minitels — Facilitateur de vie</title>
  <meta name="description" content="Les Minitels — créateur d'apps depuis 2026. Des apps pensées pour faciliter le quotidien." />
  <link rel="icon" href="assets/img/logo.svg" type="image/svg+xml" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Les Minitels" />
  <meta property="og:title" content="Les Minitels — Facilitateur de vie" />
  <meta property="og:description" content="Créateur d'apps depuis 2026. Des apps pensées pour faciliter le quotidien." />
  <meta property="og:url" content="https://lesminitels.fr/" />
  <meta property="og:image" content="https://lesminitels.fr/assets/img/LesMinitels_SocialsShare.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Les Minitels — Facilitateur de vie" />
  <meta property="og:locale" content="fr_FR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Les Minitels — Facilitateur de vie" />
  <meta name="twitter:description" content="Créateur d'apps depuis 2026. Des apps pensées pour faciliter le quotidien." />
  <meta name="twitter:image" content="https://lesminitels.fr/assets/img/LesMinitels_SocialsShare.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Changa+One:ital@0;1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/fonts.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="home">
    <div class="bg-shader" id="bg-shader"></div>

    <header class="hero">
      <div class="hero-row">
        <div class="hero-left">
          <a href="index.html" class="logo-link" aria-label="Retour à l'accueil">
            <img src="assets/img/logo.svg" alt="Logo Les Minitels" />
          </a>
          <div class="hero-texts">
            <h1 class="hero-title">Les Minitels</h1>
            <p class="hero-subtitle">Facilitateur de vie</p>
          </div>
        </div>

        <div class="hero-right">
          <p class="hero-subtitle">Créateur</p>
          <p class="hero-title">D’apps</p>
          <p class="hero-subtitle">Depuis 2026</p>
        </div>
      </div>
    </header>

    <section class="carousel-root" aria-label="Projets">
      <div class="carousel-spacer" aria-hidden="true"></div>
      <div class="carousel-bg">
        <div class="carousel-scroller-wrap">
          <div class="carousel-scroller" id="carousel-scroller" role="list"></div>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import {
      ShaderMount,
      grainGradientFragmentShader,
      GrainGradientShapes,
      ShaderFitOptions,
      getShaderColorFromString,
      getShaderNoiseTexture,
    } from "https://esm.sh/@paper-design/shaders@0.0.76";
    import { initCarousel } from "./assets/js/carousel.js";
    import { CAROUSEL_ITEMS, PROJECTS, PLACEHOLDER_SHOWREEL } from "./assets/js/projects.js";

    const bg = document.getElementById("bg-shader");
    const colors = ["#fff0fc75", "#ffd6b34f"];
    const noiseTexture = getShaderNoiseTexture();
    // WebGL texImage2D throws if the noise image isn't decoded yet.
    noiseTexture.decode().then(() => {
      new ShaderMount(
        bg,
        grainGradientFragmentShader,
        {
          u_colorBack: getShaderColorFromString("#ffffff"),
          u_colors: colors.map(getShaderColorFromString),
          u_colorsCount: colors.length,
          u_softness: 0,
          u_intensity: 0.58,
          u_noise: 0.51,
          u_shape: GrainGradientShapes.corners,
          u_noiseTexture: noiseTexture,
          u_fit: ShaderFitOptions.contain,
          u_scale: 1.04,
          u_rotation: 176,
          u_offsetX: 0.1,
          u_offsetY: -0.3,
          u_originX: 0.5,
          u_originY: 0.5,
          u_worldWidth: 0,
          u_worldHeight: 0,
        },
        undefined,
        0.46,
      );
    });

    const scroller = document.getElementById("carousel-scroller");
    CAROUSEL_ITEMS.forEach((item) => {
      const proj = PROJECTS[item.project];
      const linked = proj && proj.ready && !item.placeholder;
      const projectImage = linked && proj.showreel && proj.showreel.length > 0 ? proj.showreel[0] : null;
      const imageSrc = projectImage || (item.placeholder ? PLACEHOLDER_SHOWREEL : null);

      const a = document.createElement("a");
      a.className = "carousel-card" + (imageSrc ? "" : " is-placeholder");
      a.setAttribute("role", "listitem");
      a.setAttribute("draggable", "false");
      if (proj) a.dataset.project = proj.id;
      if (linked) {
        a.href = `/${proj.id}/`;
        a.setAttribute("aria-label", `Voir le projet ${proj.name}`);
      } else {
        a.href = "#";
        a.setAttribute("aria-label", "Projet à venir");
        a.addEventListener("click", (e) => e.preventDefault());
      }

      const inner = document.createElement("div");
      inner.className = "carousel-card-inner";

      if (imageSrc) {
        const img = document.createElement("img");
        img.src = imageSrc;
        img.alt = proj ? proj.name : item.label;
        img.setAttribute("draggable", "false");
        img.loading = "lazy";
        img.decoding = "async";
        inner.appendChild(img);
      } else {
        const label = document.createElement("div");
        label.className = "placeholder-label";
        const strong = document.createElement("strong");
        strong.textContent = item.label;
        const span = document.createElement("span");
        span.textContent = linked ? "Découvrir" : "Nouvelle app";
        label.appendChild(strong);
        label.appendChild(span);
        inner.appendChild(label);
      }

      const border = document.createElement("div");
      border.className = "carousel-card-border";
      border.setAttribute("aria-hidden", "true");
      inner.appendChild(border);

      a.appendChild(inner);
      scroller.appendChild(a);
    });

    initCarousel(document.querySelector(".carousel-root"));
  </script>
</body>
</html>
